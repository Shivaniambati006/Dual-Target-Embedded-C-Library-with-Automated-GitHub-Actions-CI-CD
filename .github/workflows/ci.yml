name: C Build and Test

on:
  push:
    branches:
      - main

  pull_request:
    branches:
      - main

jobs:
  build-and-test:

    runs-on: ubuntu-latest

    steps:

      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Install Build Tools
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential cmake

      - name: Clean Build Directory
        run: rm -rf build

      - name: Configure
        run: cmake -S . -B build

      - name: Build
        run: cmake --build build

      - name: Run Tests
        run: ./build/test_app

  embedded-build:

    runs-on: ubuntu-latest

    steps:

      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Install Build Tools
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential cmake

      - name: Configure Embedded Build
        run: cmake -S . -B build_embedded -DTARGET_PLATFORM=EMBEDDED

      - name: Build Embedded Target
        run: cmake --build build_embedded

      - name: Upload Host Build Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: host-build
          path: |
            build/Debug/app.exe
            build/Debug/test_app.exe
            build/Debug/mathlib.lib
      
      - name: Upload Embedded Build Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: embedded-build
          path: |
            build_embedded